<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mohammed Ahsan Meah | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">Mohammed Ahsan Meah</div>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Hello! I'm <span id="name"></span></h1>
      <p id="careerObjective"></p>
      <a href="#contact" class="btn"><i class="fas fa-paper-plane"></i> Contact Me</a>
    </div>
    <div class="hero-image">
      <img src="images/profile.jpg" alt="Mohammed Ahsan Meah">
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="section about">
    <h2>Personal Information</h2>
    <div id="personalInfo" class="cards"></div>
  </section>

  <!-- Education Section -->
  <section id="education" class="section education">
    <h2>Education</h2>
    <div id="educationCards" class="cards"></div>
  </section>

  <!-- Experience Section -->
  <section id="experience" class="section experience">
    <h2>Experience</h2>
    <div id="experienceCards" class="cards"></div>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="section skills">
    <h2>Skills</h2>
    <div id="skillsList" class="skills-container"></div>
  </section>

  <!-- Contact Section -->
<section id="contact" class="section contact">
  <h2>Contact Me</h2>
  <div class="contact-cards">
    <div class="contact-card">
      <i class="fas fa-envelope"></i>
      <span id="email"></span>
    </div>
    <div class="contact-card">
      <i class="fas fa-phone"></i>
      <span id="phone"></span>
    </div>
    <div class="contact-card">
      <i class="fas fa-location-dot"></i>
      <span id="address"></span>
    </div>
  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
